<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Home Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class ="nav-container">
            <a class="text-link" target="_blank" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1">
                <p>About</p>
            </a>
            <a class="text-link" target="_blank" href="https://store.google.com/in/?utm_source=hp_header&utm_medium=google_ooo&utm_campaign=GS100042&hl=en-IN">
                <p>Store</p>
            </a>
        </div>
        <nav class ="nav-container nav-container-right">
            <a class="text-link" target="_blank" href="https://mail.google.com/mail/u/0/#inbox">
                <p>Gmail</p>
            </a>
            <a class="text-link" target="_blank" href="https://www.google.com/imghp?hl=en&authuser=0&ogbl">
                <p>Images</p>
            </a>
            <a class="icon-link" target="_blank" href="https://labs.google.com/search?authuser=0">
                <i class="fa-solid fa-flask"></i>
            </a>
            <a class="icon-link" target="_blank" href="https://www.google.co.in/intl/en/about/products">
                <i class="fa-solid fa-grip"></i>
            </a>
            <button class = "img-button">
                <img  src="./public/profile-picture.jpeg" alt="profile-picture"/>
            </button>
        </nav>
    </header>
    
    <main>
        <h1 class="Title-text">Google</h1>
        <div class="Input-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input title="Search" />
            <div>
                <button class="input-icon">
                     <i class="fa-solid fa-microphone "></i>
                </button>
                <button class="input-icon">
                    <i class="fa-regular fa-camera"></i>
                </button>
            </div>
        </div>
        <div class="button-grid">
            <button>Google Search</button>
            <button>I'm Feeling Lucky</button>
        </div>
        <p class="language-text">
            Google offered in <a class="language-link" href="https://www.google.com/preferences?hl=en">English</a>
        </p>
    </main>

    <footer>
        <div>   
            <p>India</p>
        </div>
        <hr/>
        <div class="footer-grid">   
            <div class="footer-links">
                <a href="https://ads.google.com/intl/en_in/home/">
                    <p>Advertising</p>
                </a>
                <a href="https://www.google.com/services/">
                    <p>Business</p>
                </a>
                <a href="https://www.google.com/search/howsearchworks/">
                    <p>How Search works</p>
                </a>
            </div>
            <div class="footer-links">
                <a href="https://policies.google.com/privacy?hl=en-IN">
                    <p>Privacy</p>
                </a>
                <a href="https://policies.google.com/terms?hl=en-IN">
                    <p>Terms</p>
                </a>
                <a href="https://www.google.com/preferences?hl=en-IN">
                    <p>Settings</p>
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
